<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2d1b4e"/>
      <stop offset="100%" stop-color="#0a0420"/>
    </radialGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fef3c7"/>
      <stop offset="50%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="purple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c4b5fd"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>

  <!-- Фон-кружок с градиентом -->
  <circle cx="32" cy="32" r="30" fill="url(#bg)" stroke="url(#gold)" stroke-width="2"/>

  <!-- Внутренний декоративный круг -->
  <circle cx="32" cy="32" r="26" fill="none" stroke="#fbbf24" stroke-width="0.5" opacity="0.6"/>
  <circle cx="32" cy="32" r="23" fill="none" stroke="#fbbf24" stroke-width="0.3" opacity="0.4" stroke-dasharray="1 2"/>

  <!-- Лучи вокруг центральной звезды -->
  <g stroke="url(#gold)" stroke-width="1" opacity="0.7">
    <line x1="32" y1="8" x2="32" y2="14"/>
    <line x1="32" y1="50" x2="32" y2="56"/>
    <line x1="8" y1="32" x2="14" y2="32"/>
    <line x1="50" y1="32" x2="56" y2="32"/>
    <line x1="14" y1="14" x2="18" y2="18"/>
    <line x1="46" y1="46" x2="50" y2="50"/>
    <line x1="50" y1="14" x2="46" y2="18"/>
    <line x1="14" y1="50" x2="18" y2="46"/>
  </g>

  <!-- Малые звёзды по углам -->
  <g fill="#fbbf24" opacity="0.8">
    <circle cx="14" cy="14" r="1"/>
    <circle cx="50" cy="14" r="1"/>
    <circle cx="14" cy="50" r="1"/>
    <circle cx="50" cy="50" r="1"/>
  </g>

  <!-- Полумесяц сверху -->
  <path d="M 22 18 A 8 8 0 1 0 42 18 A 5.5 5.5 0 1 1 22 18 Z" fill="url(#purple)" opacity="0.9"/>

  <!-- Центральная 8-конечная звезда -->
  <path d="M 32 18 L 36 28 L 46 28 L 38 34 L 41 44 L 32 38 L 23 44 L 26 34 L 18 28 L 28 28 Z"
        fill="url(#gold)" stroke="#fef3c7" stroke-width="0.5"/>

  <!-- Малая 4-конечная звезда в центре -->
  <path d="M 32 24 L 33.5 30.5 L 40 32 L 33.5 33.5 L 32 40 L 30.5 33.5 L 24 32 L 30.5 30.5 Z"
        fill="#fef3c7" opacity="0.95"/>

  <!-- Центральная точка-глаз -->
  <circle cx="32" cy="32" r="2" fill="#7c3aed"/>
  <circle cx="32" cy="32" r="0.8" fill="#fef3c7"/>
</svg>
